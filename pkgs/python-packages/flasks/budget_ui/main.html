<!DOCTYPE html>
<html>

<head>
    <title>Budget Tool</title>
    <meta charset="utf-8">
    <link rel="icon" type="image/svg+xml" href="{{ subdomain }}/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/ansi_up@5/ansi_up.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .section {
            margin-bottom: 40px;
        }

        .account {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .status-uploaded {
            color: green;
            font-weight: bold;
        }

        .status-missing {
            color: red;
        }

        .log-box {
            background: #1e1e1e; color: #d4d4d4; font-family: monospace;
            font-size: 0.85rem; border-radius: 6px; padding: 12px;
            height: 300px; overflow-y: auto; white-space: pre-wrap;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Let's Budget! 💸</h1>

    <div class="section">
        <h2>Upload CSVs</h2>
        {% for source in sources %}
        <div class="account">
            <h3>{{ source.Account }}</h3>
            <form action="{{ url_for('budget.upload_csv', account=source.Account) }}" method="post"
                enctype="multipart/form-data">
                <input type="file" name="file" accept=".csv" required>
                <button type="submit">Upload {{ source.Account }}.csv</button>
            </form>
            <p>Status:
                {% if statuses[source.Account] %}
                <span class="status-uploaded">✓ Uploaded</span>
                {% else %}
                <span class="status-missing">✗ Not uploaded</span>
                {% endif %}
            </p>
        </div>
        {% endfor %}
    </div>

    <div class="section">
        <button onclick='runCommand({{ url_for("budget.trigger_upload") | tojson }}, "upload-log")'>
            Upload transactions
        </button>
        <div id="upload-log" class="log-box"></div>
    </div>

    <div class="section">
        <button onclick='runCommand({{ url_for("budget.trigger_process") | tojson }}, "process-log")'>
            Process transactions
        </button>
        <div id="process-log" class="log-box"></div>
    </div>

    <script>
        const ansiUp = (typeof AnsiUp !== 'undefined') ? new AnsiUp() : null;
        if (ansiUp) ansiUp.use_classes = false;

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function appendLog(log, msg) {
            const span = document.createElement('span');
            span.innerHTML = (ansiUp ? ansiUp.ansi_to_html(msg) : escHtml(msg)) + '\n';
            log.appendChild(span);
            log.scrollTop = log.scrollHeight;
        }

        function runCommand(endpoint, logId) {
            const log = document.getElementById(logId);
            log.innerHTML = '';
            appendLog(log, 'Starting...');

            const evtSource = new EventSource(endpoint);

            evtSource.onmessage = function (event) {
                appendLog(log, event.data);
            };

            evtSource.onerror = function () {
                appendLog(log, '[Connection failed or ended]');
                evtSource.close();
            };
        }
    </script>
</body>

</html>
